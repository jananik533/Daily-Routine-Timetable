<!DOCTYPE html>
<html>
    <head>
        <title>DAILY ROUTINE TIMELINE</title>
        <link rel="stylesheet" href="./style.css"/>
    </head>
    <body>
        <center>
        <bold>
        <h1>Daily Routine Timeline</h1>
        </bold>
        <div class="card">
            <h3>Morning</h3>
            <p>6:00-9:00 AM</p>
            <p>Wake up, exercise, breakfast</p>
        </div>
        <div class="card">
            <h3>Late Morning</h3>
            <p>9:00-12:00 AM</p>
            <p>Study for exam</p> 
        </div>
        <div class="card">
            <h3>Afternoon</h3>
            <p>12:00-4:00 PM</p>
            <p>Lunch, rest,continue exam preparation</p> 
        </div>
        <div class="card">
            <h3>Evening</h3>
            <p>4:00-8:00 PM</p>
            <p>Relax, walk, family time</p> 
        </div>    
    <div class="card">
            <h3>Night</h3>
            <p>8:00-11:00 PM</p>
            <p>Dinner, planning for preparation, sleep</p> 
        </div>
        </center>
    </body>
</html>
